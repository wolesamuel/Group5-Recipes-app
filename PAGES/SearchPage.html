<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Search Recipes</title>
</head>

<body class="bg-[#FAF7F2]">

<div class="flex min-h-screen">

  <aside class="hidden md:flex w-64 bg-[#0B4D2B] text-white flex-col p-6">

    <h1 class="text-2xl font-bold">
      🍲 Food Finder
    </h1>

    <nav class="mt-10 space-y-4">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
    </nav>

  </aside>

  <main class="flex-1 flex items-center justify-center p-6">

    <div class="w-full max-w-3xl text-center">

      <h1 class="text-4xl font-bold text-[#0B4D2B]">
        Search Recipes
      </h1>

      <p class="mt-4 text-gray-600">
        Search for your favorite African meals and discover new dishes.
      </p>

      <div class="mt-10 relative">

        <input
          type="text"
          placeholder="Search recipes..."
          class="w-full p-5 pl-14 rounded-2xl shadow-lg border focus:outline-none"
        />

        <span class="absolute left-5 top-5 text-xl">
          🔍
        </span>

      </div>

    </div>

  </main>

</div>

</body>
</html>
